services:
  postgres:
    image: postgres:16-alpine
    container_name: studyshot-postgres
    environment:
      POSTGRES_USER: studyshot
      POSTGRES_PASSWORD: studyshot
      POSTGRES_DB: studyshot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyshot -d studyshot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
