services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL in .env.production}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env.production}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.production}
      INITIAL_OWNER_LOGIN: ${INITIAL_OWNER_LOGIN:?set INITIAL_OWNER_LOGIN in .env.production}
      INITIAL_OWNER_PASSWORD: ${INITIAL_OWNER_PASSWORD:?set INITIAL_OWNER_PASSWORD in .env.production}
      STORAGE_DIR: ${STORAGE_DIR:-/var/lib/studyshot/storage}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-30}
      DEFAULT_RETENTION_DAYS: ${DEFAULT_RETENTION_DAYS:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      ANDROID_UPDATE_APK_PATH: ${ANDROID_UPDATE_APK_PATH:-}
      ANDROID_UPDATE_VERSION_CODE: ${ANDROID_UPDATE_VERSION_CODE:-}
      ANDROID_UPDATE_VERSION_NAME: ${ANDROID_UPDATE_VERSION_NAME:-}
      ANDROID_UPDATE_RELEASE_NOTES: ${ANDROID_UPDATE_RELEASE_NOTES:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - image-storage:/var/lib/studyshot/storage
      - ./releases:/var/lib/studyshot/releases:ro
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      STUDYSHOT_DOMAIN: ${STUDYSHOT_DOMAIN:?set STUDYSHOT_DOMAIN in .env.production}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.production}
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  image-storage:
  caddy-data:
  caddy-config:
