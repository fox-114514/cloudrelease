services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studyshot
      POSTGRES_PASSWORD: studyshot
      POSTGRES_DB: studyshot_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyshot -d studyshot_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
